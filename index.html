<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lumina - Read & Ask</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf_viewer.min.js"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf_viewer.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f5f5f5;
      height: 100vh;
      overflow: hidden;
    }

    .container {
      display: flex;
      height: 100vh;
      gap: 0;
    }

    /* PDF Viewer */
    .pdf-panel {
      flex: 1;
      display: flex;
      flex-direction: column;
      background: white;
      border-right: 1px solid #ddd;
    }

    .pdf-header {
      padding: 16px;
      border-bottom: 1px solid #ddd;
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: #fafafa;
    }

    .pdf-header h1 {
      font-size: 14px;
      font-weight: 600;
      color: #333;
      flex: 1;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .upload-input {
      padding: 8px 12px;
      border: 1px solid #ddd;
      border-radius: 4px;
      background: white;
      cursor: pointer;
      font-size: 12px;
      color: #666;
    }

    .pdf-canvas-container {
      flex: 1;
      overflow: auto;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      padding: 16px;
      background: #f5f5f5;
    }

    canvas {
      max-width: 100%;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
      background: white;
    }

    .pdf-page {
      position: relative;
      display: inline-block;
    }

    .textLayer {
      position: absolute;
      left: 0;
      top: 0;
      right: 0;
      bottom: 0;
      opacity: 0;
      line-height: 1;
      -webkit-user-select: text;
      -moz-user-select: text;
      user-select: text;
      z-index: 1;
    }

    .textLayer span {
      color: transparent;
      position: absolute;
      white-space: pre;
      cursor: text;
    }

    .textLayer span:hover {
      background: rgba(72, 133, 237, 0.2);
      opacity: 1;
    }

    .pdf-footer {
      padding: 12px 16px;
      border-top: 1px solid #ddd;
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: #fafafa;
    }

    .page-nav {
      display: flex;
      gap: 8px;
      align-items: center;
    }

    button {
      padding: 8px 12px;
      border: 1px solid #ddd;
      background: white;
      border-radius: 4px;
      cursor: pointer;
      font-size: 12px;
      color: #333;
      transition: all 0.2s;
    }

    button:hover {
      background: #f0f0f0;
      border-color: #999;
    }

    button:active {
      background: #e0e0e0;
    }

    .page-info {
      font-size: 12px;
      color: #666;
      min-width: 80px;
      text-align: center;
    }

    /* AI Panel */
    .ai-panel {
      width: 320px;
      display: flex;
      flex-direction: column;
      background: white;
      border-left: 1px solid #ddd;
    }

    .ai-header {
      padding: 16px;
      border-bottom: 1px solid #ddd;
      background: #fafafa;
    }

    .ai-header h2 {
      font-size: 14px;
      font-weight: 600;
      color: #333;
    }

    .api-key-input {
      width: 100%;
      padding: 8px;
      border: 1px solid #ddd;
      border-radius: 4px;
      font-size: 12px;
      margin-top: 8px;
      font-family: monospace;
    }

    .api-key-input::placeholder {
      color: #999;
    }

    .ai-content {
      flex: 1;
      overflow: auto;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .question-input {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .question-input textarea {
      padding: 8px;
      border: 1px solid #ddd;
      border-radius: 4px;
      font-size: 12px;
      font-family: inherit;
      resize: vertical;
      min-height: 60px;
      max-height: 100px;
    }

    .ask-btn {
      padding: 10px 12px;
      background: #2563eb;
      color: white;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-size: 12px;
      font-weight: 500;
      transition: background 0.2s;
    }

    .ask-btn:hover {
      background: #1d4ed8;
    }

    .ask-btn:disabled {
      background: #999;
      cursor: not-allowed;
    }

    .answer-box {
      background: #f9f9f9;
      padding: 12px;
      border-radius: 4px;
      border-left: 3px solid #2563eb;
      font-size: 12px;
      line-height: 1.5;
      color: #333;
    }

    .loading {
      color: #666;
      font-style: italic;
    }

    .error {
      color: #d32f2f;
      background: #ffebee;
      padding: 8px;
      border-radius: 4px;
      font-size: 12px;
    }

    .placeholder {
      color: #999;
      font-size: 12px;
      text-align: center;
      padding: 20px;
    }

    #file-input {
      display: none;
    }
  </style>
</head>
<body>
  <div class="container">
    <!-- PDF Viewer -->
    <div class="pdf-panel">
      <div class="pdf-header">
        <h1 id="filename">Load a PDF to begin</h1>
        <input type="file" id="file-input" accept=".pdf">
        <button class="upload-input" onclick="document.getElementById('file-input').click()">Upload PDF</button>
      </div>

      <div class="pdf-canvas-container">
        <div class="pdf-page">
          <canvas id="pdf-canvas"></canvas>
          <div class="textLayer" id="text-layer"></div>
        </div>
      </div>

      <div class="pdf-footer">
        <div class="page-nav">
          <button onclick="prevPage()" id="prev-btn">← Prev</button>
          <button onclick="nextPage()" id="next-btn">Next →</button>
        </div>
        <div class="page-info">
          <span id="page-num">0</span> / <span id="total-pages">0</span>
        </div>
      </div>
    </div>

    <!-- AI Panel -->
    <div class="ai-panel">
      <div class="ai-header">
        <h2>Ask Lumina</h2>
        <input type="password" class="api-key-input" id="api-key" placeholder="Paste your Gemini API key" autocomplete="off">
      </div>

      <div class="ai-content">
        <div class="question-input">
          <textarea id="question" placeholder="Ask about what you're reading..."></textarea>
          <button class="ask-btn" id="ask-btn" onclick="askAI()">Ask</button>
        </div>

        <div id="answer-container">
          <div class="placeholder">Answers will appear here</div>
        </div>
      </div>
    </div>
  </div>

  <script>
    // PDF.js setup
    pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

    let pdfDoc = null;
    let currentPage = 1;
    let pageText = '';

    // File upload
    document.getElementById('file-input').addEventListener('change', async (e) => {
      const file = e.target.files[0];
      if (!file) return;

      document.getElementById('filename').textContent = file.name;
      const arrayBuffer = await file.arrayBuffer();
      loadPDF(arrayBuffer);
    });

    async function loadPDF(arrayBuffer) {
      pdfDoc = await pdfjsLib.getDocument(arrayBuffer).promise;
      document.getElementById('total-pages').textContent = pdfDoc.numPages;
      currentPage = 1;
      renderPage(1);
    }

    async function renderPage(num) {
      if (!pdfDoc) return;

      const page = await pdfDoc.getPage(num);
      const canvas = document.getElementById('pdf-canvas');
      const ctx = canvas.getContext('2d');
      const textLayer = document.getElementById('text-layer');

      const viewport = page.getViewport({ scale: 1.5 });
      canvas.width = viewport.width;
      canvas.height = viewport.height;

      // Render canvas
      await page.render({
        canvasContext: ctx,
        viewport: viewport
      }).promise;

      // Get text content for AI
      const textContent = await page.getTextContent();
      pageText = textContent.items.map(item => item.str).join(' ');

      // Render text layer using pdf.js utility
      textLayer.innerHTML = '';
      
      const textLayerBuilder = new pdfjsLib.TextLayerBuilder({
        textLayerDiv: textLayer,
        pageIndex: num - 1
      });
      
      textLayerBuilder.setTextContent(textContent);
      textLayerBuilder.render();

      document.getElementById('page-num').textContent = num;
      updateNavButtons();
    }

    function updateNavButtons() {
      document.getElementById('prev-btn').disabled = currentPage <= 1;
      document.getElementById('next-btn').disabled = currentPage >= pdfDoc.numPages;
    }

    function prevPage() {
      if (currentPage > 1) {
        currentPage--;
        renderPage(currentPage);
      }
    }

    function nextPage() {
      if (currentPage < pdfDoc.numPages) {
        currentPage++;
        renderPage(currentPage);
      }
    }

    // AI asking
    async function askAI() {
      const question = document.getElementById('question').value.trim();
      const apiKey = document.getElementById('api-key').value.trim();

      if (!question) {
        alert('Please ask a question');
        return;
      }

      if (!apiKey) {
        alert('Please paste your Gemini API key');
        return;
      }

      if (!pageText) {
        alert('Please load a PDF first');
        return;
      }

      const askBtn = document.getElementById('ask-btn');
      const container = document.getElementById('answer-container');

      askBtn.disabled = true;
      container.innerHTML = '<div class="loading">Thinking...</div>';

      try {
        const systemPrompt = `You are a helpful AI assistant for reading papers and documents. The user is reading page ${currentPage} of a document and has a question about what they're seeing. Answer their question based on the text provided, keeping answers concise and clear.`;

        const response = await fetch('https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=' + apiKey, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({
            system_instruction: {
              parts: [{ text: systemPrompt }]
            },
            contents: [{
              parts: [{
                text: `Document text from page ${currentPage}:\n\n${pageText}\n\nUser question: ${question}`
              }]
            }]
          })
        });

        const data = await response.json();

        if (!response.ok) {
          throw new Error(data.error?.message || 'API error');
        }

        const answer = data.candidates?.[0]?.content?.parts?.[0]?.text || 'No answer generated';
        container.innerHTML = `<div class="answer-box">${escapeHtml(answer)}</div>`;
        document.getElementById('question').value = '';
      } catch (error) {
        container.innerHTML = `<div class="error">Error: ${error.message}</div>`;
      } finally {
        askBtn.disabled = false;
      }
    }

    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    // Allow Enter to submit
    document.getElementById('question').addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && e.ctrlKey) {
        askAI();
      }
    });
  </script>
</body>
</html>
